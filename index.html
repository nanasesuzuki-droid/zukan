<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="my zukan">
<meta name="theme-color" content="#6c63b6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>my zukan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap');
:root {
  --purple:#6c63b6;--purple-light:#eeeaff;--purple-mid:#a89edf;--purple-dark:#3d3785;
  --bg:#faf9f6;--bg2:#f2f0eb;--text:#1e1c2e;--text2:#6b6880;--text3:#aaa8bb;
  --border:rgba(108,99,182,0.12);--border2:rgba(108,99,182,0.22);
  --radius:16px;--radius-sm:10px;--font:'M PLUS Rounded 1c',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);overscroll-behavior:none;}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.screen.hidden{display:none!important;}
.scroll-area{flex:1;overflow-y:auto;padding:0 16px 100px;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}
.topbar{padding:52px 20px 16px;display:flex;align-items:flex-end;justify-content:space-between;}
.topbar-title{font-size:26px;font-weight:700;line-height:1;}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:4px;}
.topbar-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--purple);cursor:pointer;padding:8px 0;}
.bottom-nav{padding:8px 0 max(12px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--border);display:flex;position:relative;z-index:10;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;}
.nav-label{font-size:10px;color:var(--text3);font-weight:500;}
.nav-item.active .nav-icon{background:var(--purple-light);}
.nav-item.active .nav-label{color:var(--purple);}
#login-screen{background:var(--bg);}
.login-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;}
.login-logo{width:80px;height:80px;background:var(--purple-light);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:24px;}
.login-title{font-size:28px;font-weight:700;color:var(--purple-dark);margin-bottom:8px;}
.login-tagline{font-size:13px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:40px;}
.login-section-title{font-size:12px;color:var(--text2);align-self:flex-start;margin-bottom:8px;}
.login-input{width:100%;padding:14px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:white;font-size:16px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--purple);}
.btn-primary{width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--purple);color:white;font-size:15px;font-weight:700;font-family:var(--font);border:none;cursor:pointer;}
.login-divider{display:flex;align-items:center;gap:12px;width:100%;margin:16px 0;}
.login-divider span{font-size:11px;color:var(--text3);}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.user-list{width:100%;display:flex;flex-direction:column;gap:8px;}
.user-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:white;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--purple-dark);flex-shrink:0;}
.user-name{font-size:14px;font-weight:500;}
.user-count{font-size:11px;color:var(--text3);margin-top:1px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:8px;}
.cat-card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;user-select:none;}
.cat-card:active{opacity:0.8;}
.cat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:var(--purple-light);opacity:0.6;}
.cat-emoji{font-size:28px;margin-bottom:10px;display:block;position:relative;}
.cat-name{font-size:13px;font-weight:700;color:var(--text);display:block;margin-bottom:3px;position:relative;}
.cat-count{font-size:11px;color:var(--text2);display:block;margin-bottom:8px;position:relative;}
.pbar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;position:relative;}
.pbar-fill{height:100%;border-radius:2px;background:var(--purple);}
.cat-add{background:transparent!important;border:1.5px dashed var(--border2)!important;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:120px;}
.cat-add-icon{font-size:20px;color:var(--text3);}
.cat-add-text{font-size:12px;color:var(--text3);}
.collection-header{display:flex;align-items:center;gap:10px;padding:16px 16px 0;}
.collection-emoji{font-size:28px;}
.collection-title{font-size:20px;font-weight:700;}
.collection-meta{font-size:11px;color:var(--text2);margin:4px 16px 12px;}
.pbar-wrap-full{height:4px;background:var(--border);border-radius:2px;margin:0 16px 16px;overflow:hidden;}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:8px;}
.slot{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;}
.slot.filled{background:var(--bg2);}
.slot.empty{background:white;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;}
.slot.empty-add{border-color:var(--purple-mid);background:var(--purple-light);}
.slot-img{width:100%;height:100%;object-fit:cover;}
.slot-emoji-display{font-size:32px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg2);}
.slot-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.5));color:white;font-size:9px;padding:10px 5px 4px;text-align:center;font-weight:500;}
.slot-plus{font-size:22px;color:var(--purple);}
.slot-dot{font-size:16px;color:var(--text3);opacity:0.4;}
.reg-inner{padding:0 16px 120px;}
.photo-area{width:100%;aspect-ratio:1;background:var(--bg2);border-radius:var(--radius);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:20px;overflow:hidden;position:relative;}
.photo-area.taken{border-style:solid;border-color:var(--purple-mid);}
.photo-area-icon{font-size:36px;}
.photo-area-text{font-size:12px;color:var(--text2);}
.photo-preview{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.field-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.field-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:white;font-size:15px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:14px;}
.field-input:focus{border-color:var(--purple);}
.field-textarea{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:white;font-size:14px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:20px;min-height:80px;resize:none;}
.field-textarea:focus{border-color:var(--purple);}
.save-btn{width:100%;padding:15px;border-radius:var(--radius-sm);background:var(--purple);color:white;font-size:15px;font-weight:700;font-family:var(--font);border:none;cursor:pointer;}
#camera-input{display:none;}
.friends-list{display:flex;flex-direction:column;gap:10px;}
.friend-card{display:flex;align-items:center;gap:12px;background:white;border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;}
.friend-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.friend-name{font-size:14px;font-weight:700;}
.friend-status{font-size:11px;color:var(--text2);margin-top:2px;}
.friend-code-box{background:var(--purple-light);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:16px;}
.friend-code-label{font-size:11px;color:var(--purple);font-weight:500;margin-bottom:6px;}
.friend-code{font-size:22px;font-weight:700;color:var(--purple-dark);letter-spacing:4px;}
.friend-code-hint{font-size:10px;color:var(--text3);margin-top:6px;}
.add-friend-row{display:flex;gap:8px;margin-bottom:16px;}
.add-friend-input{flex:1;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:white;font-size:14px;font-family:var(--font);color:var(--text);outline:none;}
.add-friend-btn{padding:12px 16px;border-radius:var(--radius-sm);background:var(--purple);color:white;font-size:13px;font-weight:700;font-family:var(--font);border:none;cursor:pointer;white-space:nowrap;}
.profile-header{background:var(--purple-light);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:16px;}
.profile-avatar-big{width:64px;height:64px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:white;margin:0 auto 12px;}
.profile-name{font-size:20px;font-weight:700;color:var(--purple-dark);}
.profile-code{font-size:12px;color:var(--purple);margin-top:4px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-card{background:white;border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:var(--purple-dark);}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px;}
.logout-btn{width:100%;padding:13px;border-radius:var(--radius-sm);background:white;color:var(--text2);font-size:14px;font-family:var(--font);border:1px solid var(--border);cursor:pointer;margin-top:8px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--purple-dark);color:white;font-size:13px;font-family:var(--font);padding:10px 20px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-overlay{position:fixed;inset:0;background:rgba(30,28,46,0.4);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none!important;}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:430px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal-emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;}
.emoji-btn{width:100%;aspect-ratio:1;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emoji-btn.selected{border-color:var(--purple);background:var(--purple-light);}
</style>
</head>
<body>
<div id="app">
  <div id="login-screen" class="screen">
    <div class="login-inner">
      <div class="login-logo">📖</div>
      <div class="login-title">my zukan</div>
      <div class="login-tagline">自分の目で見つけた<br>自分だけの図鑑をつくろう</div>
      <div class="login-section-title">あたらしくはじめる</div>
      <input class="login-input" id="new-name-input" placeholder="なまえを入力（例：なな）" maxlength="20">
      <button class="btn-primary" id="btn-create-user">はじめる →</button>
      <div id="existing-users-section" class="hidden" style="width:100%">
        <div class="login-divider"><span>または</span></div>
        <div class="login-section-title">つづきから</div>
        <div class="user-list" id="user-list"></div>
      </div>
    </div>
  </div>
  <div id="main-screen" class="screen hidden">
    <div id="tab-home" class="tab-content">
      <div class="topbar">
        <div>
          <div class="topbar-title" id="home-title">my zukan</div>
          <div class="topbar-sub" id="home-sub"></div>
        </div>
      </div>
      <div class="scroll-area">
        <div class="cat-grid" id="cat-grid"></div>
      </div>
    </div>
    <div id="tab-cat" class="tab-content hidden">
      <div class="topbar" style="padding-top:52px;padding-bottom:8px;">
        <div class="topbar-back" id="btn-back-cat">← もどる</div>
      </div>
      <div class="collection-header">
        <span class="collection-emoji" id="cat-detail-emoji"></span>
        <span class="collection-title" id="cat-detail-name"></span>
      </div>
      <div class="collection-meta" id="cat-detail-meta"></div>
      <div class="pbar-wrap-full"><div class="pbar-fill" id="cat-detail-pbar" style="width:0%"></div></div>
      <div class="scroll-area" style="padding-top:0">
        <div class="slot-grid" id="slot-grid"></div>
      </div>
    </div>
    <div id="tab-register" class="tab-content hidden">
      <div class="topbar" style="padding-top:52px;padding-bottom:8px;">
        <div class="topbar-back" id="btn-back-reg">← もどる</div>
      </div>
      <div class="scroll-area reg-inner" style="padding-left:16px;padding-right:16px;">
        <div class="photo-area" id="photo-area">
          <span class="photo-area-icon">📷</span>
          <span class="photo-area-text">タップして写真を選ぶ</span>
          <img id="photo-preview" class="photo-preview hidden" alt="">
        </div>
        <input type="file" accept="image/*" id="camera-input">
        <div class="field-label">なまえ（自由につけてね）</div>
        <input class="field-input" id="reg-name" placeholder="例：アイスクリーム雲">
        <div class="field-label">メモ</div>
        <textarea class="field-textarea" id="reg-memo" placeholder="見つけた場所、気づいたこと..."></textarea>
        <button class="save-btn" id="btn-save-item">コレクションに追加する</button>
      </div>
    </div>
    <div id="tab-friends" class="tab-content hidden">
      <div class="topbar">
        <div>
          <div class="topbar-title">フレンド</div>
          <div class="topbar-sub">コードで繋がろう</div>
        </div>
      </div>
      <div class="scroll-area">
        <div class="friend-code-box">
          <div class="friend-code-label">あなたのフレンドコード</div>
          <div class="friend-code" id="my-friend-code">----</div>
          <div class="friend-code-hint">このコードを友達に教えよう</div>
        </div>
        <div class="add-friend-row">
          <input class="add-friend-input" id="friend-code-input" placeholder="フレンドのコードを入力">
          <button class="add-friend-btn" id="btn-add-friend">追加</button>
        </div>
        <div class="friends-list" id="friends-list"></div>
      </div>
    </div>
    <div id="tab-profile" class="tab-content hidden">
      <div class="topbar">
        <div><div class="topbar-title">じぶん</div></div>
      </div>
      <div class="scroll-area">
        <div class="profile-header">
          <div class="profile-avatar-big" id="profile-avatar"></div>
          <div class="profile-name" id="profile-name-display"></div>
          <div class="profile-code" id="profile-code-display"></div>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">合計</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-cats">0</div><div class="stat-label">カテゴリ</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-friends">0</div><div class="stat-label">フレンド</div></div>
        </div>
        <button class="logout-btn" id="btn-logout">ログアウト</button>
      </div>
    </div>
    <nav class="bottom-nav">
      <div class="nav-item active" id="nav-home" data-tab="home">
        <div class="nav-icon">📖</div>
        <div class="nav-label">ずかん</div>
      </div>
      <div class="nav-item" id="nav-friends" data-tab="friends">
        <div class="nav-icon">👥</div>
        <div class="nav-label">フレンド</div>
      </div>
      <div class="nav-item" id="nav-profile" data-tab="profile">
        <div class="nav-icon">🌿</div>
        <div class="nav-label">じぶん</div>
      </div>
    </nav>
  </div>
  <div class="modal-overlay hidden" id="add-cat-modal">
    <div class="modal-sheet">
      <div class="modal-title">カテゴリを追加</div>
      <div class="field-label">アイコン</div>
      <div class="modal-emoji-grid" id="emoji-grid"></div>
      <div class="field-label">なまえ</div>
      <input class="field-input" id="cat-name-input" placeholder="例：むし、ねこ、空の色">
      <button class="btn-primary" id="btn-add-category">追加する</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
const DB={getUsers(){return JSON.parse(localStorage.getItem('zukan_users')||'[]');},saveUsers(u){localStorage.setItem('zukan_users',JSON.stringify(u));},getUserData(n){return JSON.parse(localStorage.getItem('zukan_data_'+n)||'null');},saveUserData(n,d){localStorage.setItem('zukan_data_'+n,JSON.stringify(d));},getCurrentUser(){return localStorage.getItem('zukan_current')||null;},setCurrentUser(n){localStorage.setItem('zukan_current',n);},clearCurrentUser(){localStorage.removeItem('zukan_current');}};
const DEFAULT_CATS=[{id:'hana',emoji:'🌸',name:'おはな',slots:20,items:[]},{id:'kumo',emoji:'☁️',name:'そら・くも',slots:15,items:[]},{id:'food',emoji:'🍽️',name:'たべもの',slots:30,items:[]},{id:'place',emoji:'🏛️',name:'いったばしょ',slots:20,items:[]}];
const PRESET_EMOJIS=['🌸','🌿','🍂','🐝','🦋','🐚','☁️','⭐','🌙','🌈','🍜','🍩','🎂','🍵','🏛️','⛩️','🏖️','🏔️','📚','🎨','🎵','🐈','🐕','🦊','🌺','🍄'];
let currentUser=null,userData=null,currentCatId=null,selectedEmoji=PRESET_EMOJIS[0],photoDataURL=null;
function tap(el,fn){if(!el)return;let moved=false;el.addEventListener('touchstart',()=>{moved=false;},{passive:true});el.addEventListener('touchmove',()=>{moved=true;},{passive:true});el.addEventListener('touchend',e=>{if(!moved){e.preventDefault();fn(e);}});el.addEventListener('click',fn);}
function init(){const saved=DB.getCurrentUser();if(saved){const d=DB.getUserData(saved);if(d){loginAs(saved,d);return;}}showLogin();bindLoginEvents();}
function bindLoginEvents(){tap(document.getElementById('btn-create-user'),createUser);document.getElementById('new-name-input').addEventListener('keydown',e=>{if(e.key==='Enter')createUser();});}
function showLogin(){document.getElementById('login-screen').classList.remove('hidden');document.getElementById('main-screen').classList.add('hidden');renderUserList();}
function renderUserList(){const users=DB.getUsers();const sec=document.getElementById('existing-users-section');const list=document.getElementById('user-list');if(!users.length){sec.classList.add('hidden');return;}sec.classList.remove('hidden');list.innerHTML='';users.forEach(u=>{const d=DB.getUserData(u);const count=d?d.categories.reduce((s,c)=>s+c.items.length,0):0;const el=document.createElement('div');el.className='user-item';el.innerHTML=`<div class="user-avatar">${u[0].toUpperCase()}</div><div><div class="user-name">${u}</div><div class="user-count">${count}こ集めた</div></div>`;tap(el,()=>loginAs(u));list.appendChild(el);});}
function generateCode(name){let h=0;for(let i=0;i<name.length;i++)h=((h<<5)-h)+name.charCodeAt(i);return Math.abs(h).toString(36).toUpperCase().slice(0,6).padStart(6,'0');}
function createUser(){const name=document.getElementById('new-name-input').value.trim();if(!name){showToast('なまえを入力してね');return;}const users=DB.getUsers();if(users.includes(name)){showToast('そのなまえはもう使われてるよ');return;}const newData={name,code:generateCode(name),categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),friends:[{name:'公式 my zukan',code:'OFFICIAL',avatar:'📖',status:'今週のお題：春のもの'}],createdAt:Date.now()};users.push(name);DB.saveUsers(users);DB.saveUserData(name,newData);loginAs(name,newData);}
function loginAs(name,data){if(!data)data=DB.getUserData(name);currentUser=name;userData=data;DB.setCurrentUser(name);document.getElementById('login-screen').classList.add('hidden');document.getElementById('main-screen').classList.remove('hidden');document.getElementById('new-name-input').value='';bindMainEvents();switchTab('home');}
function bindMainEvents(){document.querySelectorAll('.nav-item').forEach(el=>{tap(el,()=>switchTab(el.dataset.tab));});tap(document.getElementById('btn-back-cat'),showHome);tap(document.getElementById('btn-back-reg'),()=>showCat(currentCatId));tap(document.getElementById('photo-area'),()=>document.getElementById('camera-input').click());document.getElementById('camera-input').addEventListener('change',handlePhoto);tap(document.getElementById('btn-save-item'),saveItem);tap(document.getElementById('btn-logout'),logout);tap(document.getElementById('btn-add-friend'),addFriend);tap(document.getElementById('add-cat-modal'),e=>{if(e.target.id==='add-cat-modal')document.getElementById('add-cat-modal').classList.add('hidden');});tap(document.getElementById('btn-add-category'),addCategory);}
function logout(){DB.clearCurrentUser();currentUser=null;userData=null;showLogin();}
function saveData(){DB.saveUserData(currentUser,userData);}
function switchTab(tab){document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));const tabEl=document.getElementById('tab-'+tab);const navEl=document.getElementById('nav-'+tab);if(tabEl)tabEl.classList.remove('hidden');if(navEl)navEl.classList.add('active');if(tab==='home')renderHome();if(tab==='friends')renderFriends();if(tab==='profile')renderProfile();}
function renderHome(){document.getElementById('home-title').textContent=`${currentUser}のずかん`;const total=userData.categories.reduce((s,c)=>s+c.items.length,0);document.getElementById('home-sub').textContent=`${total}こ集めた`;const grid=document.getElementById('cat-grid');grid.innerHTML='';userData.categories.forEach(cat=>{const pct=Math.round(cat.items.length/cat.slots*100);const el=document.createElement('div');el.className='cat-card';el.innerHTML=`<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span><span class="cat-count">${cat.items.length} / ${cat.slots}</span><div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>`;tap(el,()=>showCat(cat.id));grid.appendChild(el);});const addEl=document.createElement('div');addEl.className='cat-card cat-add';addEl.innerHTML=`<span class="cat-add-icon">＋</span><span class="cat-add-text">カテゴリを追加</span>`;tap(addEl,openAddCatModal);grid.appendChild(addEl);}
function showHome(){document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));document.getElementById('tab-home').classList.remove('hidden');renderHome();}
function showCat(catId){currentCatId=catId;const cat=userData.categories.find(c=>c.id===catId);document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));document.getElementById('tab-cat').classList.remove('hidden');document.getElementById('cat-detail-emoji').textContent=cat.emoji;document.getElementById('cat-detail-name').textContent=cat.name;const rem=cat.slots-cat.items.length;document.getElementById('cat-detail-meta').textContent=`${cat.items.length}こ集めた　あと${rem}こ空白`;document.getElementById('cat-detail-pbar').style.width=Math.round(cat.items.length/cat.slots*100)+'%';const grid=document.getElementById('slot-grid');grid.innerHTML='';cat.items.forEach(item=>{const el=document.createElement('div');el.className='slot filled';el.innerHTML=item.photo?`<img class="slot-img" src="${item.photo}" alt=""><div class="slot-label">${item.name}</div>`:`<div class="slot-emoji-display">${cat.emoji}</div><div class="slot-label">${item.name}</div>`;grid.appendChild(el);});const empties=cat.slots-cat.items.length;for(let i=0;i<Math.min(empties,9);i++){const el=document.createElement('div');if(i===0){el.className='slot empty empty-add';el.innerHTML=`<span class="slot-plus">＋</span>`;tap(el,showRegister);}else{el.className='slot empty';el.innerHTML=`<span class="slot-dot">・</span>`;}grid.appendChild(el);}}
function showRegister(){photoDataURL=null;document.getElementById('photo-preview').classList.add('hidden');document.getElementById('photo-area').classList.remove('taken');document.getElementById('reg-name').value='';document.getElementById('reg-memo').value='';document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));document.getElementById('tab-register').classList.remove('hidden');}
function handlePhoto(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{photoDataURL=ev.target.result;const preview=document.getElementById('photo-preview');preview.src=photoDataURL;preview.classList.remove('hidden');document.getElementById('photo-area').classList.add('taken');};reader.readAsDataURL(file);e.target.value='';}
function saveItem(){const name=document.getElementById('reg-name').value.trim();if(!name){showToast('なまえをつけてね');return;}const memo=document.getElementById('reg-memo').value.trim();const cat=userData.categories.find(c=>c.id===currentCatId);cat.items.push({name,memo,photo:photoDataURL,date:new Date().toLocaleDateString('ja-JP')});saveData();showToast('コレクションに追加したよ！');setTimeout(()=>showCat(currentCatId),600);}
function openAddCatModal(){selectedEmoji=PRESET_EMOJIS[0];document.getElementById('cat-name-input').value='';const grid=document.getElementById('emoji-grid');grid.innerHTML='';PRESET_EMOJIS.forEach((e,i)=>{const btn=document.createElement('button');btn.className='emoji-btn'+(i===0?' selected':'');btn.textContent=e;tap(btn,()=>{selectedEmoji=e;document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');});grid.appendChild(btn);});document.getElementById('add-cat-modal').classList.remove('hidden');}
function addCategory(){const name=document.getElementById('cat-name-input').value.trim();if(!name){showToast('カテゴリ名を入力してね');return;}userData.categories.push({id:'cat_'+Date.now(),emoji:selectedEmoji,name,slots:20,items:[]});saveData();document.getElementById('add-cat-modal').classList.add('hidden');renderHome();showToast(`「${name}」を追加したよ`);}
function renderFriends(){document.getElementById('my-friend-code').textContent=userData.code;const list=document.getElementById('friends-list');const bgColors=['#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7'];const txtColors=['#3C3489','#085041','#633806','#712B13'];list.innerHTML='';userData.friends.forEach((f,i)=>{const ci=i%bgColors.length;const el=document.createElement('div');el.className='friend-card';el.innerHTML=`<div class="friend-avatar" style="background:${bgColors[ci]};color:${txtColors[ci]}">${f.avatar||f.name[0]}</div><div><div class="friend-name">${f.name}</div><div class="friend-status">${f.status||'フレンド'}</div></div>`;list.appendChild(el);});}
function addFriend(){const code=document.getElementById('friend-code-input').value.trim().toUpperCase();if(!code){showToast('コードを入力してね');return;}const users=DB.getUsers();let found=null;for(const u of users){const d=DB.getUserData(u);if(d&&d.code===code){found=d;break;}}if(!found){showToast('そのコードは見つからなかったよ');return;}if(found.name===currentUser){showToast('自分のコードだよ');return;}if(userData.friends.some(f=>f.code===code)){showToast('もう追加済みだよ');return;}userData.friends.push({name:found.name,code:found.code,avatar:found.name[0],status:'フレンド'});saveData();document.getElementById('friend-code-input').value='';renderFriends();showToast(`${found.name}さんと繋がったよ！`);}
function renderProfile(){if(!userData)return;document.getElementById('profile-avatar').textContent=currentUser[0].toUpperCase();document.getElementById('profile-name-display').textContent=currentUser;document.getElementById('profile-code-display').textContent=`コード：${userData.code}`;const total=userData.categories.reduce((s,c)=>s+c.items.length,0);document.getElementById('stat-total').textContent=total;document.getElementById('stat-cats').textContent=userData.categories.length;document.getElementById('stat-friends').textContent=userData.friends.length;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
init();
</script>
</body>
</html>
